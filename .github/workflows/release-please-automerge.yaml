name: Release Please Automerge
on:
  pull_request_target:
    types: [opened, synchronized, labeled]
permissions:
  contents: write
  pull-requests: write
  checks: read
concurrency:
  group: automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  automerge:
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}"
    steps:
      - uses: actions/checkout@v6
      - name: Check if patch-only release
        id: version-check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          NEW=$(echo "$PR_TITLE" | grep -oP '\d+\.\d+\.\d+$' || true)
          CURRENT=$(jq -r '."."' .release-please-manifest.json 2>/dev/null || true)
          if [ -n "$NEW" ] && [ -n "$CURRENT" ] && \
             [ "$(echo "$NEW" | cut -d. -f1-2)" = "$(echo "$CURRENT" | cut -d. -f1-2)" ]; then
            echo "patch_only=true" >> $GITHUB_OUTPUT
          else
            echo "patch_only=false" >> $GITHUB_OUTPUT
          fi
      - name: Wait for finalize and all checks to pass
        if: steps.version-check.outputs.patch_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for finalize workflow and all checks to complete..."

          # Poll for up to 10 minutes (60 attempts × 10 seconds)
          for attempt in {1..60}; do
            echo "Attempt $attempt/60 - Checking PR status..."

            # Get the last commit on this PR
            COMMIT_SHA=$(gh api repos/$REPO/pulls/$PR_NUMBER \
              --jq '.head.sha')

            echo "Checking commit: $COMMIT_SHA"

            # Get all check runs for this commit
            CHECKS=$(gh api repos/$REPO/commits/$COMMIT_SHA/check-runs 2>/dev/null || echo '{"check_runs":[]}')

            # Extract and format check runs with error handling
            CHECKS_JSON=$(echo "$CHECKS" | jq -s '.[] | .check_runs[]? | {name: .name, conclusion: .conclusion, status: .status}' 2>/dev/null | jq -s '.' 2>/dev/null || echo '[]')

            # Also check combined status (includes CircleCI and other external CI)
            STATUS=$(gh api repos/$REPO/commits/$COMMIT_SHA/status 2>/dev/null || echo '{}')
            COMBINED_STATE=$(echo "$STATUS" | jq -r '.state // "pending"' 2>/dev/null || echo "pending")

            # Parse results
            TOTAL_CHECKS=$(echo "$CHECKS_JSON" | jq 'length')
            SUCCESSFUL=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "success")] | length')
            FAILED=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "failure")] | length')
            PENDING=$(echo "$CHECKS_JSON" | jq '[.[] | select(.status != "completed")] | length')

            echo "GitHub Checks: $SUCCESSFUL passed, $FAILED failed, $PENDING pending (total: $TOTAL_CHECKS)"
            echo "Combined Status (GitHub + CircleCI): $COMBINED_STATE"

            # Proceed when all checks pass (both GitHub and CircleCI)
            if [ "$COMBINED_STATE" = "success" ]; then
              echo "✓ All checks passed (GitHub + CircleCI)! Proceeding with automerge."
              exit 0
            fi

            # Fail fast if any check failed (GitHub or CircleCI)
            if [ "$FAILED" -gt 0 ] || [ "$COMBINED_STATE" = "failure" ]; then
              echo "✗ Some checks failed - will not automerge"
              gh api repos/$REPO/pulls/$PR_NUMBER/reviews -X POST \
                -f event=COMMENT \
                -f body="Automerge blocked: Some checks failed. Please review and fix before retrying." || true
              exit 1
            fi

            echo "Waiting... (sleeping 10 seconds)"
            sleep 10
          done

          echo "✗ Timeout: Checks did not complete within 10 minutes"
          exit 1
      - name: Automerge patch release
        if: steps.version-check.outputs.patch_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --merge
