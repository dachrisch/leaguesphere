version: '3.8'

services:
  demo-app:
    build:
      context: .
      dockerfile: container/app.Dockerfile
      args:
        - PYTHON_VERSION=3.11
    container_name: ls-demo-app
    environment:
      DJANGO_SETTINGS_MODULE: league_manager.settings.demo
      PYTHONUNBUFFERED: 1
    env_file:
      - .env.demo
    volumes:
      - ./:/app
      - demo-snapshot:/app/snapshots
    ports:
      - "8001:8000"
    depends_on:
      - demo-db
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    entrypoint: /bin/bash -c "source container/entrypoint.demo.sh && exec gunicorn league_manager.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  demo-nginx:
    build:
      context: .
      dockerfile: container/nginx.Dockerfile
    container_name: ls-demo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./container/nginx.demo.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./media:/usr/share/nginx/html/media:ro
    depends_on:
      - demo-app
    networks:
      - demo-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.demo.rule=Host(\`demo.leaguesphere.app\`)"
      - "traefik.http.routers.demo.entrypoints=websecure"
      - "traefik.http.routers.demo.tls.certresolver=letsencrypt"
      - "traefik.http.services.demo.loadbalancer.server.port=80"

  demo-db:
    image: mariadb:11
    container_name: ls-demo-db
    environment:
      MYSQL_ROOT_PASSWORD: demo_root_pass_change_me
      MYSQL_DATABASE: demo_db
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_user_pass_change_me
    volumes:
      - demo-db-data:/var/lib/mysql
    networks:
      - demo-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  demo-db-data:
  demo-snapshot:

networks:
  demo-network:
    driver: bridge
