version: 2.1

orbs:
  node: circleci/node@7.2.1
  github-cli: circleci/github-cli@3.0.0

commands:
  setup_uv:
    steps:
      - run:
          name: install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
      - restore_cache:
          keys:
            - v2-dependencies-{{ checksum "pyproject.toml" }}
            - v2-dependencies-
      - run:
          name: install dependencies
          command: |
            uv sync --extra test
      - save_cache:
          paths:
            - .venv
          key: v2-dependencies-{{ checksum "pyproject.toml" }}

  ensure_lockfile:
    steps:
      - run:
          name: Ensure uv.lock is up to date
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv lock

  build_docker_image:
    parameters:
      dockerfile:
        type: string
      image_name:
        type: string
    steps:
      - run:
          name: Build Docker image << parameters.image_name >>
          command: |
            export DOCKER_BUILDKIT=1
            docker build \
              --cache-from=leaguesphere/<< parameters.image_name >>:latest \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              -t << parameters.image_name >>:latest \
              -f << parameters.dockerfile >> .
            mkdir -p /tmp/docker-images
            docker save -o /tmp/docker-images/<< parameters.image_name >>.tar << parameters.image_name >>:latest
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker-images/<< parameters.image_name >>.tar

  push_docker_image:
    parameters:
      image_name:
        type: string
      registry_image_name:
        type: string
      tag:
        type: string
      extra_tag:
        type: string
        default: ""
    steps:
      - attach_workspace:
          at: /tmp
      - run:
          name: Push Docker image << parameters.image_name >> to << parameters.registry_image_name >>
          command: |
            docker load -i /tmp/docker-images/<< parameters.image_name >>.tar
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin
            docker tag << parameters.image_name >>:latest << parameters.registry_image_name >>:<< parameters.tag >>
            docker push << parameters.registry_image_name >>:<< parameters.tag >>
            if [ -n "<< parameters.extra_tag >>" ]; then
              docker tag << parameters.image_name >>:latest << parameters.registry_image_name >>:<< parameters.extra_tag >>
              docker push << parameters.registry_image_name >>:<< parameters.extra_tag >>
            fi

jobs:
  python:
    docker:
      - image: cimg/python:3.14.6
      - image: cimg/mysql:9.7
        command: [ --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --default-storage-engine=InnoDB ]
        environment:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: test_test_db
    working_directory: ~/repo
    steps:
      - checkout
      - setup_uv
      - run:
          name: run tests
          environment:
            SECRET_KEY: 123456-TEST
            MYSQL_HOST: 127.0.0.1
            MYSQL_DB_NAME: test_test_db
            MYSQL_USER: root
            MYSQL_PWD: ""
          command: |
            uv run pytest -n 4 --nomigrations --junitxml=test-reports/test-results.xml --cov=. --cov-report=xml --cov-report=html
      - store_test_results:
          path: test-reports

  scorecard_js:
    executor:
      name: node/default
      tag: "24.0"
    working_directory: ~/repo
    steps:
      - checkout
      - node/install-packages:
          app-dir: scorecard/
      - run:
          name: "JavaScript Test Suite"
          command: npm --prefix scorecard/ run test:run
      - run:
          name: "JavaScript Linter"
          command: |
            mkdir -p /tmp/eslint
            npm --prefix scorecard/ run eslint:junit
      - store_test_results:
          path: /tmp/eslint
      - run:
          name: "JavaScript Build"
          command: npm --prefix scorecard/ run build

  liveticker_js:
    executor:
      name: node/default
      tag: "24.0"
    working_directory: ~/repo
    steps:
      - checkout
      - node/install-packages:
          app-dir: liveticker/
      - run:
          name: "JavaScript Test Suite"
          command: npm --prefix liveticker/ run test:run
      - run:
          name: "JavaScript Linter"
          command: |
            mkdir -p /tmp/eslint
            npm --prefix liveticker/ run eslint:junit
      - store_test_results:
          path: /tmp/eslint
      - run:
          name: "JavaScript Build"
          command: npm --prefix liveticker/ run build

  passcheck_js:
    executor:
      name: node/default
      tag: "24.0"
    working_directory: ~/repo
    steps:
      - checkout
      - node/install-packages:
          app-dir: passcheck/
      - run:
          name: "JavaScript Test Suite"
          command: npm --prefix passcheck/ run test:run
      - run:
          name: "JavaScript Linter"
          command: |
            mkdir -p /tmp/eslint
            npm --prefix passcheck/ run eslint:junit
      - store_test_results:
          path: /tmp/eslint
      - run:
          name: "JavaScript Build"
          command: npm --prefix passcheck/ run build

  gameday_designer_js:
    executor:
      name: node/default
      tag: "24.0"
    working_directory: ~/repo
    steps:
      - checkout
      - node/install-packages:
          app-dir: gameday_designer/
      - run:
          name: "JavaScript Test Suite"
          command: npm --prefix gameday_designer/ run test:run
      - run:
          name: "JavaScript Linter"
          command: npm --prefix gameday_designer/ run eslint
      - run:
          name: "JavaScript Build"
          command: npm --prefix gameday_designer/ run build

  journey_dashboard_js:
    executor:
      name: node/default
      tag: "24.0"
    working_directory: ~/repo
    steps:
      - checkout
      - node/install-packages:
          app-dir: journey_dashboard/
      - run:
          name: "JavaScript Test Suite"
          command: npm --prefix journey_dashboard/ run test:run
      - run:
          name: "JavaScript Linter"
          command: |
            mkdir -p /tmp/eslint
            npm --prefix journey_dashboard/ run eslint:junit
      - store_test_results:
          path: /tmp/eslint
      - run:
          name: "JavaScript Build"
          command: npm --prefix journey_dashboard/ run build

  e2e:
    docker:
      - image: cimg/python:3.14.6-node
      - image: cimg/mysql:9.7
        command: [ --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --default-storage-engine=InnoDB ]
        environment:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: test_test_db
    working_directory: ~/repo
    steps:
      - checkout
      - setup_uv
      - node/install-packages:
          app-dir: scorecard/
      - node/install-packages:
          app-dir: gameday_designer/
      - run:
          name: Build scorecard
          command: npm --prefix scorecard/ run build
      - run:
          name: Build gameday_designer
          command: npm --prefix gameday_designer/ run build
      - run:
          name: Install Playwright browsers
          command: uv run playwright install chromium --with-deps
      - run:
          name: Run scorecard e2e tests
          environment:
            SECRET_KEY: 123456-TEST
            MYSQL_HOST: 127.0.0.1
            MYSQL_DB_NAME: test_test_db
            MYSQL_USER: root
            MYSQL_PWD: ""
          command: |
            uv run pytest scorecard/tests/e2e/ -v \
              --junitxml=test-reports/e2e-scorecard-results.xml
      - run:
          name: Run gameday_designer e2e tests
          environment:
            SECRET_KEY: 123456-TEST
          command: |
            uv run pytest gameday_designer/tests/e2e/ -v \
              --ds=test_settings \
              --junitxml=test-reports/e2e-designer-results.xml
      - store_test_results:
          path: test-reports

  build_backend:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo
    steps:
      - checkout
      - ensure_lockfile
      - setup_remote_docker:
          version: 20.10.24
          docker_layer_caching: true
      - build_docker_image:
          dockerfile: container/app.Dockerfile
          image_name: backend

  build_frontend:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo
    steps:
      - checkout
      - ensure_lockfile
      - setup_remote_docker:
          version: 20.10.24
          docker_layer_caching: true
      - build_docker_image:
          dockerfile: container/nginx.Dockerfile
          image_name: frontend

  test_backend_image:
    docker:
      - image: cimg/base:stable
    steps:
      - setup_remote_docker:
          version: 20.10.24
      - attach_workspace:
          at: /tmp
      - run:
          name: Test Backend Image Health
          command: |
            docker load -i /tmp/docker-images/backend.tar
            docker network create test_network
            docker run --network test_network -d --name app mockserver/mockserver -serverPort 8000
            
            # Set expectations via container on same network
            docker run --rm --network test_network curlimages/curl -s --retry 10 --retry-connrefused http://app:8000/mockserver/status
            docker run --rm --network test_network curlimages/curl -s -X PUT \
              --data '{"httpRequest": {"method": "GET", "path": "/"}, "httpResponse": {"statusCode": 200}}' \
              http://app:8000/mockserver/expectation
            docker run --rm --network test_network curlimages/curl -s -X PUT \
              --data '{"httpRequest": {"method": "GET", "path": "/login/"}, "httpResponse": {"statusCode": 200, "headers": {"Set-Cookie": ["csrftoken=mocktoken123"]}}}' \
              http://app:8000/mockserver/expectation
            docker run --rm --network test_network curlimages/curl -s -X PUT \
              --data '{"httpRequest": {"method": "POST", "path": "/login/"}, "httpResponse": {"statusCode": 200}}' \
              http://app:8000/mockserver/expectation

            # Test health status
            docker run --rm --detach --network test_network --name test_container backend:latest gunicorn -b 0.0.0.0:8000 league_manager.wsgi
            sleep 3
            for i in {1..10}; do
              status=$(docker inspect --format='{{.State.Health.Status}}' test_container)
              echo "Health status: $status"
              if [ "$status" = "healthy" ]; then break; fi
              sleep 6
            done
            if [ "$status" != "healthy" ]; then
              echo "Container did not become healthy"
              exit 1
            fi

  test_frontend_image:
    docker:
      - image: cimg/base:stable
    steps:
      - setup_remote_docker:
          version: 20.10.24
      - attach_workspace:
          at: /tmp
      - run:
          name: Test Frontend Image Health
          command: |
            docker load -i /tmp/docker-images/frontend.tar
            docker network create test_network
            # Frontend healthcheck DOES need a backend (or mock) at http://app:8000
            docker run --network test_network -d --name app mockserver/mockserver -serverPort 8000
            
            # Wait for mockserver and set expectations via container on same network
            docker run --rm --network test_network curlimages/curl -s --retry 10 --retry-connrefused http://app:8000/mockserver/status
            docker run --rm --network test_network curlimages/curl -s -X PUT \
              --data '{"httpRequest": {"method": "GET", "path": "/login/"}, "httpResponse": {"statusCode": 200, "headers": {"Set-Cookie": ["csrftoken=mocktoken123"]}}}' \
              http://app:8000/mockserver/expectation
            docker run --rm --network test_network curlimages/curl -s -X PUT \
              --data '{"httpRequest": {"method": "POST", "path": "/login/"}, "httpResponse": {"statusCode": 200}}' \
              http://app:8000/mockserver/expectation
            
            docker run --rm --detach --network test_network --name test_container frontend:latest
            sleep 3
            for i in {1..10}; do
              status=$(docker inspect --format='{{.State.Health.Status}}' test_container)
              echo "Health status: $status"
              if [ "$status" = "healthy" ]; then break; fi
              sleep 6
            done
            if [ "$status" != "healthy" ]; then
              echo "Container did not become healthy"
              docker logs test_container
              exit 1
            fi

  check_migrations:
    docker:
      - image: cimg/base:stable
    steps:
      - setup_remote_docker:
          version: 20.10.24
      - attach_workspace:
          at: /tmp
      - run:
          name: Check Django migrations against an ephemeral internal DB
          command: |
            docker load -i /tmp/docker-images/backend.tar
            # Ephemeral MariaDB on an internal, CI-only docker network. It is never
            # published to a host port, so nothing is exposed. The check validates
            # OUR migrations against OUR schema — decoupled from any real/prod DB.
            docker network create ls-ci-net || true
            docker run -d --name ls-ci-db --network ls-ci-net \
              -e MYSQL_ALLOW_EMPTY_PASSWORD=yes \
              -e MYSQL_DATABASE=ci_check_db \
              mariadb:latest \
              --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
            # Wait for the DB to accept connections.
            for i in $(seq 1 30); do
              docker exec ls-ci-db mariadb-admin ping -uroot --silent 2>/dev/null && break
              echo "waiting for ci db ($i)..."; sleep 2
            done
            # Run the real backend image against the fresh DB: verifies there are no
            # missing migrations AND that the full set applies cleanly end-to-end.
            docker run --rm --network ls-ci-net \
              -e MYSQL_HOST=ls-ci-db \
              -e MYSQL_DB_NAME=ci_check_db \
              -e MYSQL_USER=root \
              -e MYSQL_PWD="" \
              backend:latest \
              bash -c "set -e && python manage.py check && python manage.py makemigrations --check --dry-run && python manage.py migrate --no-input"
            docker rm -f ls-ci-db || true

  test_compose_network:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - attach_workspace:
          at: /tmp
      - run:
          name: Test Docker Compose Network
          command: |
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker load -i /tmp/docker-images/backend.tar
            docker load -i /tmp/docker-images/frontend.tar
            cd deployed
            cat > .env \<<EOF
            SERVICE_NAME=leaguesphere
            COMPOSE_PROJECT_NAME=leaguesphere
            SERVICE_HOST=localhost
            LOCAL_HOSTNAME=localhost
            RUN_MIGRATIONS=false
            EOF
            cat > ls.env.ci \<<EOF
            SECRET_KEY=ci-test-secret-key-not-for-production
            MYSQL_HOST=db
            MYSQL_DB_NAME=ci_test_db
            MYSQL_USER=ci_test_user
            MYSQL_PWD=ci_test_password
            MYSQL_ROOT_PASSWORD=ci_test_root_pw
            DEBUG=False
            EOF
            sed -e 's/env_file: ls.env/env_file: ls.env.ci/g' \
                -e 's|image: leaguesphere/backend:latest|image: backend:latest|g' \
                -e 's|image: leaguesphere/frontend:latest|image: frontend:latest|g' \
                docker-compose.yaml > docker-compose.ci.yaml
            docker network create proxy || true
            docker-compose -f docker-compose.ci.yaml up -d
            sleep 15
            docker-compose -f docker-compose.ci.yaml ps
            APP_CONTAINER=$(docker-compose -f docker-compose.ci.yaml ps -q app)
            docker exec $APP_CONTAINER sh -c 'curl -f --max-time 10 https://www.google.com'
            docker-compose -f docker-compose.ci.yaml down -v

  deploy_staging:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Plan staging deploy
          command: |
            circleci run release plan "leaguesphere-stage" \
              --environment-name="stage" \
              --component-name="leaguesphere" \
              --target-version="${CIRCLE_TAG}"
      - push_docker_image:
          image_name: backend
          registry_image_name: leaguesphere/backend
          tag: staging
          extra_tag: $CIRCLE_TAG
      - push_docker_image:
          image_name: frontend
          registry_image_name: leaguesphere/frontend
          tag: staging
          extra_tag: $CIRCLE_TAG
      - run:
          name: Update staging deploy to SUCCESS
          command: circleci run release update "leaguesphere-stage" --status=SUCCESS
          when: on_success
      - run:
          name: Update planned staging deploy to FAILED
          command: circleci run release update "leaguesphere-stage" --status=FAILED
          when: on_fail

  deploy_demo:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Set sanitized Docker tag
          command: |
            echo "export DOCKER_TAG=$(echo "$CIRCLE_TAG" | sed 's/+/-/g')" >> $BASH_ENV
      - run:
          name: Plan demo deploy
          command: |
            circleci run release plan "leaguesphere-demo" \
              --environment-name="demo" \
              --component-name="leaguesphere" \
              --target-version="${CIRCLE_TAG}"
      - push_docker_image:
          image_name: backend
          registry_image_name: leaguesphere/backend
          tag: demo
          extra_tag: $DOCKER_TAG
      - push_docker_image:
          image_name: frontend
          registry_image_name: leaguesphere/frontend
          tag: demo
          extra_tag: $DOCKER_TAG
      - run:
          name: Update demo deploy to SUCCESS
          command: circleci run release update "leaguesphere-demo" --status=SUCCESS
          when: on_success
      - run:
          name: Update planned demo deploy to FAILED
          command: circleci run release update "leaguesphere-demo" --status=FAILED
          when: on_fail

  deploy_production:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Plan production deploy
          command: |
            circleci run release plan "leaguesphere-prod" \
              --environment-name="prod" \
              --component-name="leaguesphere" \
              --target-version="${CIRCLE_TAG}"
      - push_docker_image:
          image_name: backend
          registry_image_name: leaguesphere/backend
          tag: latest
          extra_tag: $CIRCLE_TAG
      - push_docker_image:
          image_name: frontend
          registry_image_name: leaguesphere/frontend
          tag: latest
          extra_tag: $CIRCLE_TAG
      - run:
          name: Update production deploy to SUCCESS
          command: circleci run release update "leaguesphere-prod" --status=SUCCESS 
          when: on_success 
      - run:
          name: Update planned production deploy to FAILED
          command: circleci run release update "leaguesphere-prod" --status=FAILED 
          when: on_fail

  ensure_draft_release:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - github-cli/install
      - run:
          name: Ensure Draft GitHub Release (idempotent)
          command: |
            TAG="${CIRCLE_TAG}"
            REPO="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"

            # release-please already creates a draft release for tags it produces.
            # Skip creation when one exists so this step never fails on that path.
            if gh release view "${TAG}" --repo "${REPO}" &> /dev/null; then
              echo "Release ${TAG} already exists (release-please or a previous run) - skipping"
              exit 0
            fi

            echo "Creating draft release ${TAG}"
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --draft --title "${TAG}" --generate-notes
          env:
            GH_TOKEN: ${GITHUB_TOKEN}

  promote_to_prerelease:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - github-cli/install
      - run:
          name: Promote Release to Prerelease
          command: |
            TAG="${CIRCLE_TAG}"
            REPO="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"

            echo "Promoting ${TAG} to prerelease after staging succeeds"
            gh release edit "${TAG}" \
              --repo "${REPO}" \
              --draft=false \
              --prerelease
          env:
            GH_TOKEN: ${GITHUB_TOKEN}

  create_production_release:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - github-cli/install
      - run:
          name: Publish Production Release
          command: |
            TAG="${CIRCLE_TAG}"
            REPO="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"

            echo "Publishing production release for tag: ${TAG}"
            gh release edit "${TAG}" \
              --repo "${REPO}" \
              --draft=false \
              --prerelease=false \
              --latest
          env:
            GH_TOKEN: ${GITHUB_TOKEN}

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - python:
          filters:
            tags:
              only: /.*/
      - e2e:
          filters:
            tags:
              only: /.*/
      - scorecard_js:
          filters:
            tags:
              only: /.*/
      - liveticker_js:
          filters:
            tags:
              only: /.*/
      - passcheck_js:
          filters:
            tags:
              only: /.*/
      - gameday_designer_js:
          filters:
            tags:
              only: /.*/
      - journey_dashboard_js:
          filters:
            tags:
              only: /.*/

      - build_backend:
          requires:
            - python
            - e2e
          filters:
            tags:
              only: /.*/
      - build_frontend:
          requires:
            - scorecard_js
            - liveticker_js
            - passcheck_js
            - gameday_designer_js
            - journey_dashboard_js
          filters:
            tags:
              only: /.*/

      - test_backend_image:
          requires:
            - build_backend
          filters:
            tags:
              only: /.*/
      - test_frontend_image:
          requires:
            - build_frontend
          filters:
            tags:
              only: /.*/
      - check_migrations:
          context: staging
          requires:
            - build_backend
          filters:
            tags:
              only: /.*/
      - test_compose_network:
          requires:
            - build_backend
            - build_frontend
            - test_backend_image
            - test_frontend_image
            - check_migrations
          filters:
            tags:
              only: /.*/

      - ensure_draft_release:
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$/
            branches:
              ignore: /.*/

      - deploy_staging:
          context: staging
          requires:
            - test_compose_network
            - ensure_draft_release
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$/
            branches:
              ignore: /.*/

      - promote_to_prerelease:
          requires:
            - deploy_staging
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$/
            branches:
              ignore: /.*/

      - deploy_demo:
          context: demo
          requires:
            - test_compose_network
          filters:
            tags:
              only: /.*\+demo\.[0-9]+$/
            branches:
              ignore: /.*/

      - hold_production:
          type: approval
          requires:
            - test_compose_network
            - ensure_draft_release
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
      
      - deploy_production:
          context: production
          requires:
            - hold_production
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+$/
      - deploy_demo:
          name: deploy_demo_production
          context: demo
          requires:
            - hold_production
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
      - create_production_release:
          requires:
            - deploy_production
          filters:
            tags:
              only: /^v?[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
